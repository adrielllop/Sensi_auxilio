<!doctype html>

  <style>

      margin: 0;
      padding: 0;

    body, html {

    #particles-js {

    .key-screen {

      align-items: center;
      backdrop-filter: blur(4px);

    .key-card {

    @keyframes fadeInUp {

    .key-card h1 {
      font-size: 52px;
      font-weight: 700;
      background: linear-gradient(135deg, #a0d0ff, #ffffff);

      margin-top: 16px;

    .auxilios input[type="checkbox"]:checked { background-color: white; }
    .progress-bar { width: 100%; background-color: #333; border-radius: 10px; overflow: hidden; margin-top: 10px; display: none; }
    .progress-bar-inner { height: 10px; width: 0; background-color: #fff; transition: width 3s linear; }

</head>

<div id="particles-js"></div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script type="module">

  // 🔥 CHAVE MESTRA REMOVIDA – Agora apenas Firebase valida
  // const VALID_MASTER_KEY = "MESTREXIT-999"; // REMOVIDO

  function parseDuration(value, unit) {
    if (unit === 'permanent' || value <= 0) return null;
    const num = parseInt(value) || 0;
    if (num <= 0) return null;
    let ms = 0;
    switch (unit) {
      case 'minutes': ms = num * 60 * 1000; break;
      case 'hours': ms = num * 60 * 60 * 1000; break;
      case 'days': ms = num * 24 * 60 * 60 * 1000; break;
      case 'months': ms = num * 30 * 24 * 60 * 60 * 1000; break;
      case 'years': ms = num * 365 * 24 * 60 * 60 * 1000; break;
      default: return null;
    }
    return { ms };
  }

  function isKeyExpired(createdAt, expiresIn) {
    if (!createdAt || !expiresIn || expiresIn === 'permanent') return false;
    const parts = expiresIn.split(' ');
    if (parts.length < 2) return false;
    const value = parseInt(parts[0]);
    const unit = parts[1];
    const duration = parseDuration(value, unit);
    if (!duration) return false;
    const now = Timestamp.now();
    const createdAtMs = createdAt.toMillis();
    const expirationMs = createdAtMs + duration.ms;
    return now.toMillis() > expirationMs;
  }

  async function validateMain() {
    const input = document.getElementById('mainKeyInput').value.trim();
    const err = document.getElementById('mainKeyError');
    
    // 🔐 Agora apenas valida pelo Firebase (nenhuma chave mestra)
    try {
      const q = query(keysCollection, where("keyString", "==", input), where("status", "==", "active"));
      const snapshot = await getDocs(q);
      
      if (!snapshot.empty) {
        const docData = snapshot.docs[0].data();
        const createdAt = docData.createdAt;
        const expiresIn = docData.expiresIn;
        if (createdAt && expiresIn && isKeyExpired(createdAt, expiresIn)) {
          err.innerHTML = '<i class="fas fa-clock"></i> Matrícula expirada!';
          setTimeout(() => err.innerHTML = '', 2000);
          return;
        }
        unlockApp();
      } else {
        err.innerHTML = '<i class="fas fa-times-circle"></i> Matrícula inválida ou inativa!';
        setTimeout(() => err.innerHTML = '', 2000);
      }
    } catch (e) {
      err.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Erro de conexão. Tente novamente.';
      setTimeout(() => err.innerHTML = '', 3000);
      console.error(e);
    }
  }
  
  function unlockApp() {
    document.getElementById('keyScreen').style.opacity = '0';

      document.getElementById('keyScreen').style.display = 'none';

  const modelos = {

  };

  // Funções globais para UI
  window.atualizarModelos = function() {
    const marca = document.getElementById('marca').value;
    const modeloSelect = document.getElementById('modelo');
    modeloSelect.innerHTML = '<option value="">Selecione o modelo</option>';
    if(marca && modelos[marca]) {
      modelos[marca].forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.textContent = m; modeloSelect.appendChild(opt); });
    }
  };

  window.gerarSensibilidade = function() {
    const modelo = document.getElementById('modelo').value;
    const resultado = document.getElementById('resultado');
    if(modelo) {
      const geral = Math.floor(Math.random() * 101) + 100;
      const pontoVermelho = Math.floor(Math.random() * 101) + 100;
      const mira2x = Math.floor(Math.random() * 101) + 100;
      const mira4x = Math.floor(Math.random() * 101) + 100;
      const tamanhoBotao = Math.floor(Math.random() * (63-45+1)) + 45;
      resultado.innerHTML = `<strong>Modelo:</strong> ${modelo}<br><strong>Geral:</strong> ${geral}<br><strong>Ponto Vermelho:</strong> ${pontoVermelho}<br><strong>Mira 2x:</strong> ${mira2x}<br><strong>Mira 4x:</strong> ${mira4x}<br><strong>Tamanho do Botão:</strong> ${tamanhoBotao}`;
      resultado.style.display = 'block';
    } else {
      resultado.style.display = 'none';

  };

  window.mostrar = function(menu) {
    document.getElementById('sensi').style.display = menu === 'sensi' ? 'block' : 'none';
    document.getElementById('auxilio').style.display = menu === 'auxilio' ? 'block' : 'none';
    document.getElementById('btnSensi').classList.toggle('active', menu === 'sensi');

  window.injetarAuxilio = function() {

    const int = setInterval(() => { if(w>=100) { clearInterval(int); msg.style.display='block'; } else { w++; inner.style.width = w+'%'; } }, 30);

  // Inicialização
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('validateMainBtn').addEventListener('click', validateMain);
    document.getElementById('mainKeyInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateMain(); });
    
    document.getElementById('btnSensi').addEventListener('click', () => mostrar('sensi'));
